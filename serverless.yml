service: Sita-Dairy
provider:
  name: aws
  runtime: nodejs22.x
  region: ap-south-1
  stage: dev
  environment:
    NODE_ENV: development
  apiGateway:
    binaryMediaTypes:
      - multipart/form-data
      - application/octet-stream
      - image/*
      - application/pdf

functions:
  api:
    handler: src/index.handler
    timeout: 29
    environment:
      JWT_SECRET_KEY: ${env:JWT_SECRET_KEY}
      CLOUDINERY_API_KEY: ${env:CLOUDINERY_API_KEY}
      CLOUDINERY_API_SECRET: ${env:CLOUDINERY_API_SECRET}
      CLOUDINERY_CLOUD_NAME: ${env:CLOUDINERY_CLOUD_NAME}
      MongoDbURI: ${env:MongoDbURI}
      PHONEPE_CLIENT_ID: ${env:PHONEPE_CLIENT_ID}
      PHONEPE_CLIENT_SECRET: ${env:PHONEPE_CLIENT_SECRET}
      PHONEPE_CLIENT_VERSION: ${env:PHONEPE_CLIENT_VERSION}
      PHONEPE_ENV: ${env:PHONEPE_ENV}
      PHONEPE_CALLBACK_USERNAME: ${env:PHONEPE_CALLBACK_USERNAME}
      PHONEPE_CALLBACK_PASSWORD: ${env:PHONEPE_CALLBACK_PASSWORD}
      PHONEPE_REDIRECT_URL: ${env:PHONEPE_REDIRECT_URL}
      WALLET_TOPUP_MIN: ${env:WALLET_TOPUP_MIN}
      WALLET_TOPUP_MAX: ${env:WALLET_TOPUP_MAX}
    events:
      - http:
          path: /{proxy+}
          method: any
          cors:
            origin: "*"
            headers:
              - Content-Type
              - X-Amz-Date
              - Authorization
              - X-Api-Key
              - X-Amz-Security-Token
              - X-Amz-User-Agent
            allowCredentials: false
plugins:
  - serverless-dotenv-plugin
  - serverless-offline
custom:
  serverless-offline:
    useInProcess: false
    httpPort: 8081
    noPrependStageInUrl: true
package:
  exclude:
    - .gitignore
    - .env
    - README.md
  include:
    - node_modules/**
    - public/**
